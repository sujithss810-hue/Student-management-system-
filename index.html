<!DOCTYPE html>
<html>
<head>
<title>Student Management</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: MidnightBlue;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
}

input{
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:8px;
    border:none;
    background:#1e3c72;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#16305c;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#1e3c72;
    color:white;
}

.edit{
    background:#28a745;
    color:white;
}

.delete{
    background:#dc3545;
    color:white;
}

.search-box{
    margin-bottom:15px;
}

@media(max-width:600px){
    form{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<h1>Student Management Dashboard</h1>

<div class="container">

<form id="studentForm">
    <input type="text" id="name" placeholder="Student Name" required>
    <input type="text" id="roll" placeholder="Roll Number" required>
    <input type="number" id="age" placeholder="Age" required>
    <input type="text" id="course" placeholder="Course" required>
    <button type="submit">Save</button>
</form>

<div class="search-box">
    <input type="text" id="search" placeholder="Search by Name or Roll">
</div>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Age</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

const form = document.getElementById("studentForm");
const tableBody = document.getElementById("tableBody");
const searchInput = document.getElementById("search");

function displayStudents(data = students){
    tableBody.innerHTML = "";
    data.forEach((student,index)=>{
        tableBody.innerHTML += `
        <tr>
            <td>${student.name}</td>
            <td>${student.roll}</td>
            <td>${student.age}</td>
            <td>${student.course}</td>
            <td>
                <button class="edit" onclick="editStudent(${index})">Edit</button>
                <button class="delete" onclick="deleteStudent(${index})">Delete</button>
            </td>
        </tr>`;
    });
}

form.addEventListener("submit",function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const roll = document.getElementById("roll").value;
    const age = document.getElementById("age").value;
    const course = document.getElementById("course").value;

    if(editIndex === -1){
        students.push({name,roll,age,course});
    }else{
        students[editIndex] = {name,roll,age,course};
        editIndex = -1;
    }

    localStorage.setItem("students",JSON.stringify(students));
    form.reset();
    displayStudents();
});

function editStudent(index){
    const s = students[index];
    document.getElementById("name").value = s.name;
    document.getElementById("roll").value = s.roll;
    document.getElementById("age").value = s.age;
    document.getElementById("course").value = s.course;
    editIndex = index;
}

function deleteStudent(index){
    if(confirm("Delete this student?")){
        students.splice(index,1);
        localStorage.setItem("students",JSON.stringify(students));
        displayStudents();
    }
}

searchInput.addEventListener("input",function(){
    const value = this.value.toLowerCase();
    const filtered = students.filter(s =>
        s.name.toLowerCase().includes(value) ||
        s.roll.toLowerCase().includes(value)
    );
    displayStudents(filtered);
});

displayStudents();
</script>

</body>
</html>
